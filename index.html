<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Lists</title>
<meta name="theme-color" content="#1e2a2a">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app" style="max-width:1200px;margin:0 auto">
<h1>✅ To-Do Lists</h1>
<div class="sync-bar">
  <div class="sync-dot loading" id="sync-dot"></div>
  <span id="sync-label">Σύνδεση...</span>
</div>

<div class="lists-row" id="lists-row"></div>
<button class="add-panel-toggle" id="add-panel-toggle">+ Νέα εργασία</button>
<div class="add-panel" id="add-panel">
  <button class="add-panel-close" id="add-panel-close" type="button">✕ Κλείσιμο</button>
  <div class="row">
    <input id="inp-task" class="inp" type="text" placeholder="Νέα εργασία..." />
    <select class="sel" id="sel-prio">
      <option value="low">🟢 Χαμηλή</option>
      <option value="med" selected>🟡 Μέτρια</option>
      <option value="high">🔴 Υψηλή</option>
    </select>
  </div>
  <div class="row">
    <span style="color:#aaa;font-size:13px">📅</span>
    <input id="inp-date" class="inp inp-date" type="date" />
    <span id="time-wrap" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span style="color:#aaa;font-size:13px">🕐</span>
      <div class="time-group"><select class="tsel" id="ts-h"></select><span class="time-sep">:</span><select class="tsel" id="ts-m"></select></div>
      <span class="time-sep">–</span>
      <div class="time-group"><select class="tsel" id="te-h"></select><span class="time-sep">:</span><select class="tsel" id="te-m"></select></div>
    </span>
    <div class="allday-wrap"><input type="checkbox" id="chk-allday"/><label for="chk-allday">Ολοήμερο</label></div>
    <button class="clear-btn" id="clear-btn">✕ Clear</button>
    <button class="add-btn" id="add-btn">+ Προσθήκη</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="toolbar">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="active">Εκκρεμείς</button>
    <button class="filter-btn" data-filter="done">Ολοκληρωμένες</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex:1;max-width:320px">
    <input id="search-inp" class="inp" type="text" placeholder="🔍 Αναζήτηση..." style="padding:5px 10px;font-size:13px;height:32px" />
  </div>
  <div class="sort-row">
    <button class="sort-btn" id="sort-date">📅 Ημ/νία</button>
    <button class="sort-btn" id="sort-prio">🚩 Προτεραιότητα</button>
  </div>
</div>
<div class="tasks-list" id="tasks-list"></div>
</div>
<div class="toast" id="toast"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Floating Notes -->
<div class="notes-popup" id="notes-popup">
  <div class="notes-sidebar">
    <div class="notes-sidebar-header">
      <span class="notes-sidebar-title">Σημειώσεις</span>
      <button class="notes-add-btn" id="notes-add" title="Νέα σημείωση">+</button>
    </div>
    <div class="notes-list" id="notes-list"></div>
  </div>
  <div class="notes-main">
    <div class="notes-main-header">
      <span class="notes-drag-handle" id="notes-drag-handle" title="Μετακίνηση">⠿</span>
      <input class="notes-title-inp" id="notes-title-inp" placeholder="Τίτλος σημείωσης..." />
      <button class="notes-close-btn" id="notes-close">✕</button>
    </div>
    <div class="notes-body">
      <textarea class="notes-textarea" id="notes-textarea" placeholder="Γράψε σημείωση..."></textarea>
    </div>
    <div class="notes-footer" id="notes-footer" style="display:flex;justify-content:space-between;align-items:center"><span id="notes-footer-text"></span><button class="notes-copy-btn" id="notes-copy-btn" title="Αντιγραφή σημείωσης">📋 Αντιγραφή</button></div>
  </div>
</div>

<!-- Market Popup -->
<div class="market-popup" id="market-popup">
  <div class="market-header">
    <span class="market-drag" id="market-drag">⠿</span>
    <span class="market-title">🛒 Λίστα Αγορών</span>
    <button class="market-close" id="market-close">✕</button>
  </div>
  <div class="mkt-quick" id="mkt-quick"></div>
  <div class="mkt-inp-row">
    <input class="mkt-inp" id="mkt-inp" placeholder="Προσθήκη προϊόντος..." />
    <button class="mkt-inp-btn" id="mkt-inp-btn">+</button>
  </div>
  <div class="mkt-list" id="mkt-list"></div>
  <div class="mkt-footer">
    <button class="mkt-copy-btn" id="mkt-copy">📋 Αντιγραφή για WhatsApp</button>
    <button class="mkt-clear-btn" id="mkt-clear">🗑 Καθαρισμός</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
