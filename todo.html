<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Lists</title>
<meta name="theme-color" content="#1e2a2a">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1e2a2a;color:#e0f0f0;font-family:Arial,sans-serif;padding:1.5rem;min-height:100vh}
h1{font-size:22px;font-weight:500;color:#e0f0f0;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.sync-bar{display:flex;align-items:center;gap:10px;background:#243333;border:1px solid #2e4444;border-radius:10px;padding:8px 14px;margin-bottom:1.25rem;font-size:12px;color:#7ab8b8}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#446666;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#4ade80}
.sync-dot.err{background:#e74c3c}
.sync-dot.loading{background:#f0c040;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lists-row{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.list-tab{padding:5px 16px;border-radius:20px;border:1px solid #4db6ac;background:transparent;color:#e0f0f0;cursor:pointer;font-size:13px;transition:all .15s}
.list-tab.active{background:#00897b;color:#fff;border-color:#00897b}
.list-tab:hover:not(.active){border-color:#4db6ac;color:#fff}
.list-tab.add-list{border-style:dashed;font-size:18px;padding:2px 14px;color:#4db6ac}
.list-tab.add-list:hover{color:#fff;border-color:#4db6ac}
.list-tab.del-list{color:#e74c3c;border-color:#e74c3c;font-size:12px}
.list-tab.del-list:hover{background:#e74c3c;color:#fff}
.list-rename-inp{background:#1a2828;border:1px solid #4db6ac;border-radius:20px;padding:4px 12px;color:#e0f0f0;font-size:13px;outline:none;width:120px}
.edit-pencil{background:transparent;border:none;cursor:pointer;padding:2px 5px;font-size:13px;color:#7ab8b8;border-radius:4px}
.edit-pencil:hover{color:#e0f0f0}
.add-panel{background:#243333;border:1px solid #2e4444;border-radius:12px;padding:14px;margin-bottom:1.25rem}
.add-panel-toggle{display:none;width:100%;background:#243333;border:1px solid #2e4444;border-radius:12px;padding:11px 14px;margin-bottom:1.25rem;color:#4db6ac;font-size:14px;font-weight:600;cursor:pointer;text-align:left;align-items:center;gap:8px}
.add-panel-toggle:active{border-color:#4db6ac}
.add-panel-close{display:none}
.row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.row:last-child{margin-bottom:0}
.inp{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:9px 12px;color:#e0f0f0;font-size:14px;outline:none;flex:1;min-width:0}
.inp:focus{border-color:#4db6ac}
.inp::placeholder{color:#446666}
.inp-date{width:145px;flex:none;color:#e0f0f0}
.tsel{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:8px 6px;color:#e0f0f0;font-size:14px;outline:none;cursor:pointer;width:66px;flex:none;text-align:center}
.tsel option{background:#1e2a2a;color:#e0f0f0}
.sel{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:9px 10px;color:#e0f0f0;font-size:13px;outline:none;cursor:pointer}
.sel option{background:#1e2a2a;color:#e0f0f0}
.add-btn{background:#00897b;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.add-btn:hover{background:#00796b}
.clear-btn{background:transparent;border:1px solid #2e4444;border-radius:8px;padding:9px 14px;font-size:13px;color:#7ab8b8;cursor:pointer;white-space:nowrap;flex-shrink:0}
.clear-btn:hover{border-color:#4db6ac;color:#e0f0f0}
.allday-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.allday-wrap input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#00897b;border:2px solid #4db6ac}
.allday-wrap label{font-size:13px;color:#e0f0f0;cursor:pointer}
.time-sep{color:#7ab8b8;font-size:13px;flex-shrink:0}
.time-group{display:flex;align-items:center;gap:4px}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:6px;border:1px solid #2e4444;background:transparent;color:#7ab8b8;cursor:pointer;font-size:12px;transition:all .15s}
.filter-btn.active{background:#2e4444;color:#e0f0f0;border-color:#4db6ac}
.filter-btn:hover:not(.active){color:#e0f0f0;border-color:#4db6ac}
.sort-row{display:flex;gap:6px}
.sort-btn{padding:4px 12px;border-radius:6px;border:1px solid #2e4444;background:transparent;color:#7ab8b8;cursor:pointer;font-size:12px;transition:all .15s}
.sort-btn.active{background:#243333;color:#4db6ac;border-color:#2e4444}
.sort-btn:hover:not(.active){color:#e0f0f0}
.stats{display:flex;gap:14px;margin-bottom:.75rem;flex-wrap:wrap}
.stat{font-size:12px;color:#7ab8b8}
.stat span{color:#e0f0f0;font-weight:500}
.tasks-list{display:flex;flex-direction:column;gap:6px}
.task-item{background:#243333;border:1px solid #2e4444;border-radius:10px;padding:11px 14px;transition:border-color .15s}
.task-item:hover{border-color:#4db6ac}
.task-item.done{opacity:1}
.task-top{display:flex;align-items:flex-start;gap:10px}
.task-main{flex:1;min-width:0}
.cb{width:18px;height:18px;border-radius:50%;border:2px solid #4db6ac;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px}
.cb.checked{background:#00897b;border-color:#00897b}
.cb.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.task-text{font-size:14px;color:#e0f0f0;word-break:break-word;font-weight:500;overflow-wrap:break-word;min-width:0}
.task-item.done .task-text{color:#80cbc4}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p-high{background:#e74c3c}
.p-med{background:#f39c12}
.p-low{background:#2ecc71}
.task-meta{font-size:11px;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.meta-date{color:#60a5fa}
.meta-time{color:#b2dfdb}
.task-notes{font-size:13px;color:#b2dfdb;margin-top:6px;line-height:1.5;white-space:pre-wrap;word-break:break-word;border-left:2px solid #2e4444;padding-left:8px}
.completed-date{font-size:11px;color:#4ade80;margin-top:4px;display:flex;align-items:center;gap:4px}
.task-actions{display:flex;gap:5px;flex-shrink:0;align-items:center;margin-top:1px}
.edit-btn{background:#2e4444;border:1px solid #3a5555;border-radius:6px;padding:6px 8px;color:#e0f0f0;cursor:pointer;font-size:15px;line-height:1;white-space:nowrap;min-width:32px;text-align:center}
.edit-btn:hover{background:#3a5555}
.edit-btn.active{background:#1e4d7a;border-color:#4a9eff;color:#4a9eff}
.del-btn{background:#3a1a1a;border:1px solid #7a1e1e;border-radius:6px;padding:6px 8px;color:#e74c3c;cursor:pointer;font-size:15px;line-height:1;white-space:nowrap;min-width:32px;text-align:center}
.del-btn:hover{background:#5a1a1a}
.edit-panel{background:#1a2828;border:1px solid #2e4444;border-radius:8px;padding:12px;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.edit-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.edit-label{font-size:12px;color:#80cbc4;width:90px;flex-shrink:0}
.edit-inp{background:#1e2a2a;border:1px solid #2e4444;border-radius:6px;padding:7px 10px;color:#e0f0f0;font-size:13px;outline:none;flex:1;min-width:0}
.etsel{background:#1e2a2a;border:1px solid #2e4444;border-radius:6px;padding:7px 6px;color:#e0f0f0;font-size:13px;outline:none;cursor:pointer;width:64px;text-align:center}
.etsel option{background:#1e2a2a;color:#e0f0f0}
.esel{background:#1e2a2a;border:1px solid #2e4444;border-radius:6px;padding:7px 10px;color:#e0f0f0;font-size:13px;outline:none;cursor:pointer}
.esel option{background:#1e2a2a;color:#e0f0f0}
.notes-inp{background:#1e2a2a;border:1px solid #2e4444;border-radius:6px;padding:7px 10px;color:#e0f0f0;font-size:13px;outline:none;width:100%;resize:vertical;min-height:60px;font-family:Arial,sans-serif}
.notes-inp::placeholder{color:#446666}
.save-btn{background:#00897b;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer}
.save-btn:hover{background:#00796b}
.cancel-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;padding:7px 14px;font-size:13px;color:#7ab8b8;cursor:pointer}
.cancel-btn:hover{border-color:#4db6ac;color:#e0f0f0}
.empty{text-align:center;padding:2.5rem;color:#446666;font-size:14px}
.new-list-inp{background:#1a2828;border:1px solid #4db6ac;border-radius:20px;padding:5px 14px;color:#e0f0f0;font-size:13px;outline:none;width:130px}
.new-list-inp::placeholder{color:#446666}
.toast{position:fixed;top:1rem;right:1rem;background:#1a3a5c;color:#4a9eff;border:1px solid #1e4d7a;border-radius:8px;padding:10px 16px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:280px;z-index:9999}
.toast.show{opacity:1}
.toast.err{background:#3a1a1a;color:#e74c3c;border-color:#7a1e1e}
.toast.ok{background:#1a3a1a;color:#4ade80;border-color:#2d6b2d}
input[type=date]{color-scheme:dark}

/* ── Floating Notes ───────────────────────────────────── */
.notes-fab{padding:5px 14px;border-radius:20px;border:1px solid #4db6ac;background:transparent;color:#4db6ac;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;position:relative}
.notes-fab:hover,.notes-fab.active{background:#00897b;color:#fff;border-color:#00897b}
.notes-fab .badge{background:#60a5fa;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
.notes-popup{position:fixed;width:460px;max-width:calc(100vw - 2rem);height:420px;min-width:320px;min-height:280px;background:#243333;border:1px solid #2e4444;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.8);z-index:9000;display:none;flex-direction:row;overflow:hidden;cursor:default;resize:both}
.notes-popup.open{display:flex}
.notes-main-header{cursor:default}
.notes-sidebar{width:150px;min-width:150px;background:#1a2828;border-right:1px solid #2e4444;display:flex;flex-direction:column;overflow:hidden}
.notes-sidebar-header{padding:10px 10px 8px;border-bottom:1px solid #2e4444;display:flex;align-items:center;justify-content:space-between}
.notes-sidebar-title{font-size:12px;color:#7ab8b8;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.notes-add-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;color:#7ab8b8;font-size:16px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.notes-add-btn:hover{border-color:#4db6ac;color:#e0f0f0}
.notes-list{flex:1;overflow-y:auto;padding:6px}
.notes-list::-webkit-scrollbar{width:4px}.notes-list::-webkit-scrollbar-thumb{background:#2e4444;border-radius:2px}
.note-item{padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .12s}
.note-item:hover{background:#2e4444;border-color:#4db6ac}
.note-item.active{background:#2e4444;border-color:#4db6ac}
.note-item-title{font-size:12px;color:#e0f0f0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-date{font-size:10px;color:#7ab8b8;margin-top:2px}
.notes-del-btn{background:transparent;border:none;color:#446666;cursor:pointer;font-size:12px;float:right;padding:0 2px;line-height:1}
.notes-del-btn:hover{color:#e74c3c}
.notes-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.notes-main-header{padding:10px 12px 8px;border-bottom:1px solid #2e4444;display:flex;align-items:center;gap:8px}
.notes-title-inp{background:transparent;border:none;color:#e0f0f0;font-size:14px;font-weight:500;outline:none;flex:1;min-width:0}
.notes-title-inp::placeholder{color:#446666}
.notes-drag-handle{cursor:move;color:#446666;font-size:14px;padding:0 4px;user-select:none;flex-shrink:0}
.notes-close-btn{background:transparent;border:none;color:#7ab8b8;cursor:pointer;font-size:18px;line-height:1;padding:0 2px}
.notes-close-btn:hover{color:#e0f0f0}
.notes-body{flex:1;padding:10px 12px;overflow:hidden}
.notes-textarea{width:100%;height:100%;background:transparent;border:none;color:#e0f0f0;font-size:13px;font-family:Arial,sans-serif;resize:none;outline:none;line-height:1.6}
.notes-textarea::placeholder{color:#446666}
.notes-footer{padding:6px 12px;border-top:1px solid #2e4444;font-size:11px;color:#7ab8b8;text-align:right}

/* ── Market Popup ─────────────────────────────────── */
.market-fab{padding:5px 14px;border-radius:20px;border:1px solid #4db6ac;background:transparent;color:#4db6ac;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.market-fab:hover,.market-fab.active{background:#00897b;color:#fff;border-color:#00897b}
.market-popup{position:fixed;width:360px;max-width:calc(100vw - 2rem);height:480px;min-width:280px;min-height:320px;background:#243333;border:1px solid #2e4444;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.8);z-index:9000;display:none;flex-direction:column;overflow:hidden;resize:both}
.market-popup.open{display:flex}
.market-header{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #2e4444;background:#1a2828;flex-shrink:0;gap:8px}
.market-drag{cursor:move;color:#446666;font-size:14px;user-select:none;flex-shrink:0}
.market-title{font-size:13px;font-weight:600;color:#80cbc4;text-transform:uppercase;letter-spacing:.5px;flex:1}
.market-close{background:transparent;border:none;color:#7ab8b8;cursor:pointer;font-size:18px;line-height:1;padding:0 2px}
.market-close:hover{color:#e0f0f0}
/* quick presets */
.mkt-quick{padding:8px 10px;border-bottom:1px solid #2e4444;display:flex;flex-wrap:wrap;gap:5px;max-height:100px;overflow-y:auto;flex-shrink:0}
.mkt-quick::-webkit-scrollbar{width:3px}.mkt-quick::-webkit-scrollbar-thumb{background:#2e4444;border-radius:2px}
.mkt-chip{padding:3px 9px;border-radius:12px;border:1px solid #2e4444;background:#1a2828;color:#b2dfdb;font-size:12px;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.mkt-chip:hover{border-color:#4db6ac;color:#e0f0f0;background:#2e4444}
.mkt-chip-del{display:none;background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:11px;padding:0;line-height:1}
.mkt-chip:hover .mkt-chip-del{display:inline}
.mkt-chip-edit-inp{background:transparent;border:none;color:#e0f0f0;font-size:12px;outline:none;width:70px}
.mkt-add-chip{padding:3px 9px;border-radius:12px;border:1px dashed #2e4444;background:transparent;color:#446666;font-size:12px;cursor:pointer;transition:all .12s}
.mkt-add-chip:hover{border-color:#4db6ac;color:#4db6ac}
/* input */
.mkt-inp-row{padding:8px 10px;border-bottom:1px solid #2e4444;display:flex;gap:6px;flex-shrink:0}
.mkt-inp{background:#1a2828;border:1px solid #2e4444;border-radius:6px;padding:6px 10px;color:#e0f0f0;font-size:13px;outline:none;flex:1}
.mkt-inp:focus{border-color:#4db6ac}
.mkt-inp::placeholder{color:#446666}
.mkt-inp-btn{background:#00897b;border:none;border-radius:6px;padding:6px 12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.mkt-inp-btn:hover{background:#00796b}
/* list */
.mkt-list{flex:1;overflow-y:auto;padding:6px 10px}
.mkt-list::-webkit-scrollbar{width:4px}.mkt-list::-webkit-scrollbar-thumb{background:#2e4444;border-radius:2px}
.mkt-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #1a2828;cursor:pointer}
.mkt-item:hover{background:#2e4444;border-radius:6px;padding:6px 8px}
.mkt-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid #4db6ac;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mkt-cb.done{background:#00897b;border-color:#00897b}
.mkt-cb.done::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.mkt-text{flex:1;font-size:13px;color:#e0f0f0}
.mkt-item.is-done .mkt-text{color:#446666;text-decoration:line-through}
.mkt-del{background:transparent;border:none;color:#446666;cursor:pointer;font-size:12px;padding:0 4px;opacity:0}
.mkt-item:hover .mkt-del{opacity:1}
.mkt-del:hover{color:#e74c3c}
/* footer */
.mkt-footer{padding:8px 10px;border-top:1px solid #2e4444;display:flex;gap:6px;flex-shrink:0}
.mkt-copy-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;padding:5px 10px;color:#7ab8b8;font-size:12px;cursor:pointer;flex:1;text-align:center}
.mkt-copy-btn:hover{border-color:#4db6ac;color:#e0f0f0}
.mkt-clear-btn{background:transparent;border:1px solid #2e4444;border-radius:6px;padding:5px 10px;color:#446666;font-size:12px;cursor:pointer}
.mkt-clear-btn:hover{border-color:#e74c3c;color:#e74c3c}
/* copy btn in notes footer */
.notes-copy-btn{background:transparent;border:none;color:#7ab8b8;font-size:11px;cursor:pointer;padding:0 6px}
.notes-copy-btn:hover{color:#e0f0f0}
.mkt-qty{display:flex;align-items:center;gap:3px;flex-shrink:0}
.mkt-qty-btn{background:#2e4444;border:1px solid #3a5555;border-radius:4px;color:#e0f0f0;width:22px;height:22px;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.mkt-qty-btn:hover{background:#00897b;border-color:#00897b;color:#fff}
.mkt-qty-num{font-size:12px;color:#e0f0f0;min-width:18px;text-align:center;font-weight:700}

/* ── Photo attachment ─────────────────────────────── */
.task-photo{margin-top:8px;cursor:pointer}
.task-photo img{max-width:120px;max-height:90px;border-radius:6px;border:1px solid #2e4444;object-fit:cover;transition:opacity .15s}
.task-photo img:hover{opacity:.8}
.photo-upload-btn{background:#2e4444;border:1px solid #3a5555;border-radius:6px;padding:5px 10px;color:#7ab8b8;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.photo-upload-btn:hover{border-color:#4db6ac;color:#e0f0f0}
.photo-remove-btn{background:transparent;border:none;color:#446666;font-size:11px;cursor:pointer;padding:2px 4px;margin-left:4px}
.photo-remove-btn:hover{color:#e74c3c}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.8)}
.lightbox-close{position:absolute;top:1rem;right:1.5rem;background:transparent;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}

@media (max-width: 640px){
  body{padding:.75rem}
  h1{font-size:17px;margin-bottom:.6rem;gap:6px}
  .sync-bar{padding:5px 10px;margin-bottom:.6rem;font-size:11px;gap:6px}
  .sync-dot{width:6px;height:6px}
  .lists-row{gap:7px;margin-bottom:.6rem}
  .list-tab{padding:8px 16px;font-size:14px}
  .list-tab.add-list{padding:4px 15px;font-size:20px}
  .edit-pencil{padding:6px 8px;font-size:15px}
  .notes-fab,.market-fab{padding:7px 14px;font-size:13px}
  .add-panel{display:none}
  .add-panel.open{display:block}
  .add-panel-toggle{display:flex}
  .add-panel-toggle.hidden{display:none}
  .stats{gap:7px;font-size:10px;margin-bottom:.4rem;row-gap:2px}
  .toolbar{gap:5px;margin-bottom:.6rem}
  .filters{gap:4px}
  .filter-btn{padding:3px 10px;font-size:11px}

async function supaGet(){
  const r=await fetch(SUPA_URL+'/rest/v1/tododata?id=eq.'+ROW_ID+'&select=data',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}

}

async function supaSet(data){
  const r=await fetch(SUPA_URL+'/rest/v1/tododata?id=eq.'+ROW_ID,{
    method:'PATCH',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({data:data})
  });
  if(!r.ok){
    await fetch(SUPA_URL+'/rest/v1/tododata',{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({id:ROW_ID,data:data})
    });
  }
}

let state={lists:['Γενικά','Εργασία','Προσωπικά'],activeList:'Γενικά',tasks:{'Γενικά':[],'Εργασία':[],'Προσωπικά':[]},filter:'active',sort:'none',sortDir:1,renamingList:null,addingList:false,editingId:null};

function setSyncStatus(status,msg){
  document.getElementById('sync-dot').className='sync-dot '+status;
  document.getElementById('sync-label').textContent=msg;
}

let saveTimeout=null;
function save(){
  localStorage.setItem('todo_bk',JSON.stringify(state));
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveToCloud,1000);
}

async function saveToCloud(){
  setSyncStatus('loading','Αποθήκευση...');
  try{
    const s={...state,renamingList:null,addingList:false,editingId:null};
    await supaSet(JSON.stringify(s));
    setSyncStatus('ok','Συγχρονισμένο ✓');
  }catch(e){
    setSyncStatus('err','Σφάλμα αποθήκευσης');
  }
}

async function loadFromCloud(){
  setSyncStatus('loading','Φόρτωση...');
  try{
    const raw=await supaGet();
    if(raw!==null){
      let data=raw;
      try{data=JSON.parse(raw);}catch(e){}
      if(typeof data==='string'){try{data=JSON.parse(data);}catch(e){data={};}}
      if(data&&data.lists&&data.tasks){
        state={...state,...data,renamingList:null,addingList:false,editingId:null,filter:'active'};
      }
      setSyncStatus('ok','Συγχρονισμένο ✓');
      render();return;
    }
    loadLocal();render();
  }catch(e){
    loadLocal();render();
  }
}

function loadLocal(){
  try{
    const b=localStorage.getItem('todo_bk');
    if(b){const d=JSON.parse(b);state={...state,...d,renamingList:null,addingList:false,editingId:null,filter:'active'};}
    setSyncStatus('err','Offline — τοπικά δεδομένα');
  }catch(e){setSyncStatus('err','Σφάλμα');}
}

function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

const prioRank={high:0,med:1,low:2};
function getSorted(tasks){
  const t=[...tasks];
  if(state.sort==='date') t.sort((a,b)=>{const da=a.date||'9999',db=b.date||'9999';return(da<db?-1:da>db?1:0)*state.sortDir;});
  else if(state.sort==='prio') t.sort((a,b)=>(prioRank[a.prio]-prioRank[b.prio])*state.sortDir);
  return t;
}
function getFiltered(){
  const tasks=state.tasks[state.activeList]||[];const f=state.filter;
  let out=f==='active'?tasks.filter(t=>!t.done):f==='done'?tasks.filter(t=>t.done):tasks.filter(t=>!t.done);
  const q=(document.getElementById('search-inp')||{}).value||'';
  if(q.trim()) out=out.filter(t=>t.text.toLowerCase().includes(q.trim().toLowerCase())||(t.notes||'').toLowerCase().includes(q.trim().toLowerCase()));
  return getSorted(out);
}
function fmtDate(d){if(!d)return '';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;}
function fmtTime(h,m){if(!h)return '';return h+':'+m;}

function commitRename(old,nw){
  nw=nw.trim();if(!nw||nw===old){state.renamingList=null;render();return;}
  if(state.lists.includes(nw)&&nw!==old){showToast('Υπάρχει ήδη!','err');state.renamingList=null;render();return;}
  const i=state.lists.indexOf(old);state.lists[i]=nw;state.tasks[nw]=state.tasks[old];delete state.tasks[old];
  if(state.activeList===old)state.activeList=nw;state.renamingList=null;save();render();
}

function renderLists(){
  const row=document.getElementById('lists-row');row.innerHTML='';
  state.lists.forEach(l=>{
    if(state.renamingList===l){
      const inp=document.createElement('input');inp.className='list-rename-inp';inp.value=l;
      inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();commitRename(l,inp.value);}if(e.key==='Escape'){state.renamingList=null;render();}};
      inp.onblur=()=>commitRename(l,inp.value);row.appendChild(inp);setTimeout(()=>{inp.focus();inp.select();},40);return;
    }
    const wrap=document.createElement('span');wrap.style.cssText='display:inline-flex;align-items:center;gap:2px';
    const b=document.createElement('button');b.className='list-tab'+(l===state.activeList?' active':'');b.textContent=l;
    b.onclick=()=>{state.activeList=l;state.filter='all';save();render();};
    const eb=document.createElement('button');eb.className='edit-pencil';eb.textContent='✏️';eb.title='Μετονομασία';
    eb.onclick=e=>{e.stopPropagation();state.renamingList=l;render();};
    wrap.appendChild(b);wrap.appendChild(eb);row.appendChild(wrap);
  });
  if(state.addingList){
    const inp=document.createElement('input');inp.className='new-list-inp';inp.placeholder='Όνομα λίστας...';
    inp.onkeydown=e=>{if(e.key==='Enter'){const v=inp.value.trim();if(v&&!state.lists.includes(v)){state.lists.push(v);state.tasks[v]=[];state.activeList=v;}state.addingList=false;save();render();}if(e.key==='Escape'){state.addingList=false;render();}};
    inp.onblur=()=>{state.addingList=false;render();};row.appendChild(inp);setTimeout(()=>inp.focus(),40);
  } else {
    const ab=document.createElement('button');ab.className='list-tab add-list';ab.textContent='+';ab.title='Νέα λίστα';
    ab.onclick=()=>{state.addingList=true;render();};row.appendChild(ab);
    if(state.lists.length>1){
      const db=document.createElement('button');db.className='list-tab del-list';db.textContent='🗑 '+state.activeList;
      db.onclick=()=>{if(!confirm('Διαγραφή "'+state.activeList+'";'))return;const i=state.lists.indexOf(state.activeList);delete state.tasks[state.activeList];state.lists.splice(i,1);state.activeList=state.lists[Math.max(0,i-1)];save();render();};
      row.appendChild(db);
    }
  }
  // Notes button in tab row
  const nb=document.createElement('button');nb.className='notes-fab'+(notesState.open?' active':'');nb.id='notes-fab';nb.title='Σημειωματάριο';
  const badgeEl=document.createElement('span');badgeEl.className='badge';badgeEl.id='notes-badge';
  nb.innerHTML='📝 Σημειώσεις';nb.appendChild(badgeEl);
  nb.onclick=notesToggle;
  row.appendChild(nb);
  // Market button
  const mb=document.createElement('button');mb.className='market-fab'+(mktState.open?' active':'');mb.id='market-fab';mb.title='Λίστα Αγορών';
  mb.textContent='🛒 Αγορές';
  mb.onclick=mktToggle;
  row.appendChild(mb);
}
function renderStats(){
  const tasks=state.tasks[state.activeList]||[];const done=tasks.filter(t=>t.done).length;
  document.getElementById('stats').innerHTML=`<div class="stat">Σύνολο: <span>${tasks.length}</span></div><div class="stat">Εκκρεμείς: <span>${tasks.length-done}</span></div><div class="stat">Ολοκληρωμένες: <span>${done}</span></div><div class="stat">Με ημ/νία: <span>${tasks.filter(t=>t.date).length}</span></div>`;
}
function renderFilters(){
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.filter===state.filter);
    b.onclick=()=>{
      state.filter=b.dataset.filter;
      const si=document.getElementById('search-inp');if(si)si.value='';
      render();
    };
  });
}
function renderSort(){
  const sd=document.getElementById('sort-date'),sp=document.getElementById('sort-prio');
  sd.classList.toggle('active',state.sort==='date');sp.classList.toggle('active',state.sort==='prio');

  sd.onclick=()=>{if(state.sort==='date')state.sortDir*=-1;else{state.sort='date';state.sortDir=1;}render();};
  sp.onclick=()=>{if(state.sort==='prio')state.sortDir*=-1;else{state.sort='prio';state.sortDir=1;}render();};
}
function makeEditPanel(task){
  const panel=document.createElement('div');panel.className='edit-panel';
  function makeTG(hv,mv){
    const g=document.createElement('div');g.className='time-group';
    const hs=document.createElement('select');hs.className='etsel';hs.innerHTML='<option value="">--</option>';
    for(let h=0;h<24;h++){const o=document.createElement('option');o.value=pad(h);o.textContent=pad(h);if(pad(h)===hv)o.selected=true;hs.appendChild(o);}

    for(let m=0;m<60;m+=5){const o=document.createElement('option');o.value=pad(m);o.textContent=pad(m);if(pad(m)===mv)o.selected=true;ms.appendChild(o);}
    g.appendChild(hs);g.appendChild(sep);g.appendChild(ms);g._h=hs;g._m=ms;return g;

  const r1=document.createElement('div');r1.className='edit-row';

  const ti=document.createElement('input');ti.className='edit-inp';ti.value=task.text;
  r1.appendChild(l1);r1.appendChild(ti);
  const r2=document.createElement('div');r2.className='edit-row';
  const l2=document.createElement('span');l2.className='edit-label';l2.textContent='Ημ/νία';
  const di=document.createElement('input');di.type='date';di.className='edit-inp';di.style.cssText='width:145px;flex:none';di.value=task.date||'';
  const adw=document.createElement('div');adw.className='allday-wrap';
  const adc=document.createElement('input');adc.type='checkbox';adc.checked=!!task.allDay;
  const adl=document.createElement('label');adl.textContent=' Ολοήμερο';adw.appendChild(adc);adw.appendChild(adl);
  r2.appendChild(l2);r2.appendChild(di);r2.appendChild(adw);
  const r3=document.createElement('div');r3.className='edit-row';
  const l3=document.createElement('span');l3.className='edit-label';l3.textContent='Ώρα';
  const tsg=makeTG(task.tsH||'',task.tsM||'');const sep2=document.createElement('span');sep2.className='time-sep';sep2.textContent='–';
  const teg=makeTG(task.teH||'',task.teM||'');
  const psel=document.createElement('select');psel.className='esel';
  [{v:'low',t:'🟢 Χαμηλή'},{v:'med',t:'🟡 Μέτρια'},{v:'high',t:'🔴 Υψηλή'}].forEach(p=>{
    const o=document.createElement('option');o.value=p.v;o.textContent=p.t;if(p.v===task.prio)o.selected=true;psel.appendChild(o);
  });
  r3.appendChild(l3);r3.appendChild(tsg);r3.appendChild(sep2);r3.appendChild(teg);r3.appendChild(psel);
  const r4=document.createElement('div');r4.className='edit-row';r4.style.alignItems='flex-start';
  const l4=document.createElement('span');l4.className='edit-label';l4.style.paddingTop='8px';l4.textContent='Παρατηρήσεις';
  const ni=document.createElement('textarea');ni.className='notes-inp';ni.placeholder='Παρατηρήσεις...';ni.value=task.notes||'';
  r4.appendChild(l4);r4.appendChild(ni);
  // Photo upload row
  const rPhoto=document.createElement('div');rPhoto.className='edit-row';rPhoto.style.alignItems='center';
  const lPhoto=document.createElement('span');lPhoto.className='edit-label';lPhoto.textContent='Φωτογραφία';
  const photoWrap=document.createElement('div');photoWrap.style.cssText='display:flex;align-items:center;gap:8px;flex-wrap:wrap';
  let photoData = task.photo || null;
  const fileInp=document.createElement('input');fileInp.type='file';fileInp.accept='image/*';fileInp.style.display='none';
  const uploadBtn=document.createElement('button');uploadBtn.className='photo-upload-btn';uploadBtn.type='button';
  uploadBtn.innerHTML='📎 '+(photoData?'Αλλαγή':'Επιλογή φωτό');
  uploadBtn.onclick=()=>fileInp.click();
  const previewImg=document.createElement('img');previewImg.style.cssText='max-width:80px;max-height:60px;border-radius:6px;border:1px solid #2e4444;display:'+(photoData?'block':'none');
  if(photoData)previewImg.src=photoData;
  const removeBtn=document.createElement('button');removeBtn.className='photo-remove-btn';removeBtn.type='button';removeBtn.textContent='🗑 Αφαίρεση';
  removeBtn.style.cssText='display:'+(photoData?'inline-flex':'none')+';align-items:center;gap:4px;background:#3a1a1a;border:1px solid #7a1e1e;border-radius:6px;padding:5px 10px;color:#e74c3c;font-size:12px;cursor:pointer;margin-top:6px';
  removeBtn.onclick=()=>{photoData=null;previewImg.style.display='none';removeBtn.style.display='none';cameraBtn.style.display='inline-flex';uploadBtn.innerHTML='📎 Επιλογή φωτό';};
  // Camera button (mobile)
  const cameraInp=document.createElement('input');cameraInp.type='file';cameraInp.accept='image/*';cameraInp.capture='environment';cameraInp.style.display='none';
  const cameraBtn=document.createElement('button');cameraBtn.className='photo-upload-btn';cameraBtn.type='button';
  cameraBtn.innerHTML='📷 Κάμερα';cameraBtn.style.display=photoData?'none':'inline-flex';
  cameraBtn.onclick=()=>cameraInp.click();
  function compressPhoto(dataUrl,cb){
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;

  dropZone.ondrop=(e)=>{
    e.preventDefault();dropZone.style.borderColor='#2e4444';dropZone.style.color='#446666';
    const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=ev=>{photoData=ev.target.result;previewImg.src=photoData;previewImg.style.display='block';removeBtn.style.display='inline-flex';cameraBtn.style.display='none';uploadBtn.innerHTML='📎 Αλλαγή';};
    reader.readAsDataURL(file);

  dropZone.textContent='📂 σύρε φωτό εδώ ή Ctrl+V για paste';
  document.addEventListener('paste',function pasteHandler(e){
    if(!panel.isConnected){document.removeEventListener('paste',pasteHandler);return;}
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(let i=0;i<items.length;i++){
      if(items[i].type.startsWith('image/')){

function renderTasks(){

  const teH=(!allDay&&document.getElementById('te-h').value)||'';const teM=(!allDay&&document.getElementById('te-m').value)||'';

  if(!state.tasks[state.activeList])state.tasks[state.activeList]=[];

function addToCalendar(task, btn){
  if(!task.date){ showToast('Δεν έχει ημερομηνία!','err'); return; }
  const tsH=task.tsH||'', tsM=task.tsM||'';
  const teH=task.teH||'', teM=task.teM||'';
  const notes=task.notes||'';
  let url;
  if(task.allDay){
    const d=task.date.replace(/-/g,'');
    // end date must be next day for all-day events
    const nextDay=new Date(task.date);nextDay.setDate(nextDay.getDate()+1);
    const nd=nextDay.toISOString().slice(0,10).replace(/-/g,'');
    url='https://calendar.google.com/calendar/render?action=TEMPLATE'
      +'&text='+encodeURIComponent(task.text)
      +'&dates='+d+'/'+nd
      +(notes?'&details='+encodeURIComponent(notes):'');
  } else {
    const d=task.date.replace(/-/g,'');
    const sh=tsH||'09',sm=tsM||'00';
    const eh=teH||(String(parseInt(sh)+1).padStart(2,'0')),em=teM||'00';
    url='https://calendar.google.com/calendar/render?action=TEMPLATE'
      +'&text='+encodeURIComponent(task.text)
      +'&dates='+d+'T'+sh+sm+'00/'+d+'T'+eh+em+'00'
      +'&ctz=Europe/Athens'
      +(notes?'&details='+encodeURIComponent(notes):'');
  }
  task.gcal=true;save();render();
  window.open(url,'_blank');
  showToast('Άνοιξε το Google Calendar — πάτα Save!','ok');
}

<script>
// ── Floating Notes ───────────────────────────────────────────────
const NOTES_KEY = 'todo_notes_v1';
// notesState declared early above

function notesLoad() {
  try {
    const raw = localStorage.getItem(NOTES_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      notesState.notes = d.notes || [];
    }
  } catch(e) {}
  if (!notesState.notes.length) {
    notesState.notes = [{ id: Date.now(), title: 'Πρώτη σημείωση', body: '', updatedAt: new Date().toISOString() }];
  }
  notesState.activeId = notesState.notes[0].id;
}

function notesSave() {
  localStorage.setItem(NOTES_KEY, JSON.stringify({ notes: notesState.notes }));
  // also push to Supabase notes table (best effort)
  supaNotesSet(JSON.stringify(notesState.notes));
}

async function supaNotesSet(data) {
  try {
    const r = await fetch(SUPA_URL+'/rest/v1/tododata?id=eq.99', {
      method: 'PATCH',
      headers: {'apikey': SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({data: data})
    });
    if (!r.ok) {
      await fetch(SUPA_URL+'/rest/v1/tododata', {
        method: 'POST',
        headers: {'apikey': SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify({id: 99, data: data})
      });
    }
  } catch(e) {}
}

async function supaNotesLoad() {
  try {
    const r = await fetch(SUPA_URL+'/rest/v1/tododata?id=eq.99&select=data', {
      headers: {'apikey': SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    const j = await r.json();
    if (j && j.length > 0 && j[0].data) {
      const d = JSON.parse(j[0].data);
      if (Array.isArray(d) && d.length) {
        notesState.notes = d;
        notesState.activeId = d[0].id;
        notesRender();
        notesLoadActive();
      }
    }
  } catch(e) {}
}

function fmtNoteDate(iso) {
  try {
    const d = new Date(iso);
    return pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  } catch(e) { return ''; }
}

function notesRender() {
  const list = document.getElementById('notes-list');
  list.innerHTML = '';
  notesState.notes.forEach(n => {
    const item = document.createElement('div');
    item.className = 'note-item' + (n.id === notesState.activeId ? ' active' : '');
    item.innerHTML = '<span class="notes-del-btn" data-id="'+n.id+'">✕</span><div class="note-item-title">'+(n.title||'Χωρίς τίτλο')+'</div><div class="note-item-date">'+fmtNoteDate(n.updatedAt)+'</div>';
    item.onclick = (e) => {
      if (e.target.classList.contains('notes-del-btn')) return;
      notesFlush();
      notesState.activeId = n.id;
      notesRender();
      notesLoadActive();
    };
    item.querySelector('.notes-del-btn').onclick = (e) => {
      e.stopPropagation();
      if (notesState.notes.length === 1) { showToast('Πρέπει να υπάρχει τουλάχιστον μία σημείωση.','err'); return; }
      notesState.notes = notesState.notes.filter(x => x.id !== n.id);
      if (notesState.activeId === n.id) notesState.activeId = notesState.notes[0].id;
      notesSave(); notesRender(); notesLoadActive();
    };
    list.appendChild(item);
  });
  // badge
  const badge = document.getElementById('notes-badge');
  if(badge){
    badge.textContent = notesState.notes.length;
    badge.style.display = notesState.notes.length > 1 ? 'flex' : 'none';
  }
}

function notesLoadActive() {
  const n = notesState.notes.find(x => x.id === notesState.activeId);
  const ti = document.getElementById('notes-title-inp');
  const ta = document.getElementById('notes-textarea');
  const ft = document.getElementById('notes-footer');
  const ftSpan = document.getElementById('notes-footer-text');
  if (n) {
    ti.value = n.title || '';
    ta.value = n.body || '';
    if(ftSpan) ftSpan.textContent = n.updatedAt ? 'Αποθήκευση: ' + fmtNoteDate(n.updatedAt) : '';
  } else {
    ti.value = ''; ta.value = '';
    if(ftSpan) ftSpan.textContent = '';
  }
}

function notesFlush() {
  const n = notesState.notes.find(x => x.id === notesState.activeId);
  if (!n) return;
  const ti = document.getElementById('notes-title-inp');
  const ta = document.getElementById('notes-textarea');
  n.title = ti.value.trim() || 'Χωρίς τίτλο';
  n.body = ta.value;
  n.updatedAt = new Date().toISOString();
}

let notesFlushTimer = null;
function notesAutoSave() {
  clearTimeout(notesFlushTimer);
  notesFlushTimer = setTimeout(() => {
    notesFlush();
    notesSave();
    notesRender();
    notesLoadActive();
  }, 800);
}

document.getElementById('notes-title-inp').oninput = notesAutoSave;
document.getElementById('notes-textarea').oninput = notesAutoSave;

function notesToggle(){
  const popup = document.getElementById('notes-popup');
  notesState.open = !notesState.open;
  popup.classList.toggle('open', notesState.open);
  // Position popup near button
  if(notesState.open && !notesState.dragged){
    const fab = document.getElementById('notes-fab');
    if(fab){
      const r=fab.getBoundingClientRect();
      const pw=460, ph=420;
      let left=r.left;
      let top=r.bottom+8;
      if(left+pw>window.innerWidth-8) left=window.innerWidth-pw-8;
      if(top+ph>window.innerHeight-8) top=r.top-ph-8;
      popup.style.left=Math.max(8,left)+'px';
      popup.style.top=Math.max(8,top)+'px';
      popup.style.bottom='';popup.style.right='';
    }
  }
  renderLists();
}
// Draggable popup
(function(){
  let dragging=false,ox=0,oy=0;
  const header=()=>document.getElementById('notes-drag-handle');
  document.addEventListener('mousedown',e=>{
    const h=header();if(!h||!h.contains(e.target))return;
    const popup=document.getElementById('notes-popup');
    const r=popup.getBoundingClientRect();
    ox=e.clientX-r.left;oy=e.clientY-r.top;dragging=true;
    popup.style.transition='none';notesState.dragged=true;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const popup=document.getElementById('notes-popup');
    let left=e.clientX-ox, top=e.clientY-oy;
    left=Math.max(0,Math.min(left,window.innerWidth-popup.offsetWidth));
    top=Math.max(0,Math.min(top,window.innerHeight-popup.offsetHeight));
    popup.style.left=left+'px';popup.style.top=top+'px';
    popup.style.bottom='';popup.style.right='';
  });
  document.addEventListener('mouseup',()=>{dragging=false;});
})();
document.getElementById('notes-close').onclick = () => {
  notesFlush(); notesSave();
  document.getElementById('notes-popup').classList.remove('open');
  notesState.open = false;
};
document.getElementById('notes-add').onclick = () => {
  notesFlush();
  const n = { id: Date.now(), title: 'Νέα σημείωση', body: '', updatedAt: new Date().toISOString() };
  notesState.notes.unshift(n);
  notesState.activeId = n.id;
  notesSave(); notesRender(); notesLoadActive();
  setTimeout(() => document.getElementById('notes-title-inp').focus(), 50);
};

notesLoad();
notesRender();
notesLoadActive();
supaNotesLoad();

// ── Market ───────────────────────────────────────────────────────
const MKT_KEY = 'todo_market_v1';
// mktState declared early above

function mktLoad() {
  try {
    const raw = localStorage.getItem(MKT_KEY);
    if (raw) { const d=JSON.parse(raw); mktState.items=d.items||[]; mktState.presets=d.presets||[]; }
  } catch(e) {}
}
function mktSave() {
  localStorage.setItem(MKT_KEY, JSON.stringify({items:mktState.items,presets:mktState.presets}));
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function mktRender() {
  // Presets
  const qEl=document.getElementById('mkt-quick');
  if(!qEl)return;
  qEl.innerHTML='';
  mktState.presets.forEach((p,i)=>{
    const chip=document.createElement('span');chip.className='mkt-chip';
    chip.innerHTML='<span class="mkt-chip-lbl">'+escHtml(p)+'</span><button class="mkt-chip-del">✕</button>';
    chip.querySelector('.mkt-chip-lbl').onclick=()=>mktAddItem(p);
    chip.querySelector('.mkt-chip-lbl').ondblclick=(e)=>{e.stopPropagation();mktEditPreset(chip,i,p);};
    chip.querySelector('.mkt-chip-del').onclick=(e)=>{e.stopPropagation();mktState.presets.splice(i,1);mktSave();mktRender();};
    qEl.appendChild(chip);
  });
  const addBtn=document.createElement('button');addBtn.className='mkt-add-chip';addBtn.textContent='+ Νέο';
  addBtn.onclick=()=>{
    const inp=document.createElement('input');inp.className='mkt-inp';inp.placeholder='Όνομα...';
    inp.style.cssText='width:80px;padding:3px 7px;font-size:12px;border-radius:12px';
    addBtn.replaceWith(inp);inp.focus();
    let committed=false;
    const commit=()=>{if(committed)return;committed=true;const v=inp.value.trim();if(v&&!mktState.presets.includes(v)){mktState.presets.push(v);mktSave();}mktRender();};
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape'){committed=true;mktRender();}};
    inp.onblur=commit;
  };
  qEl.appendChild(addBtn);

  // List
  const listEl=document.getElementById('mkt-list');
  if(!listEl)return;
  listEl.innerHTML='';
  const unchecked=mktState.items.filter(x=>!x.done);
  const checked=mktState.items.filter(x=>x.done);
  if(!mktState.items.length){listEl.innerHTML='<div style="text-align:center;padding:2rem;color:#446666;font-size:13px">Άδεια λίστα</div>';return;}
  [...unchecked,...checked].forEach(item=>{
    const idx=mktState.items.indexOf(item);
    const row=document.createElement('div');
    row.className='mkt-item'+(item.done?' is-done':'');
    const cb=document.createElement('div');cb.className='mkt-cb'+(item.done?' done':'');
    const txt=document.createElement('span');txt.className='mkt-text';txt.textContent=item.text;
    const del=document.createElement('button');del.className='mkt-del';del.textContent='✕';
    const toggle=()=>{mktState.items[idx].done=!mktState.items[idx].done;mktSave();mktRender();};
    cb.onclick=toggle; txt.onclick=toggle;
    del.onclick=(e)=>{e.stopPropagation();mktState.items.splice(idx,1);mktSave();mktRender();};
    row.appendChild(cb); row.appendChild(txt);
    if(!item.done){
      const qty=document.createElement('div');qty.className='mkt-qty';
      const qm=document.createElement('button');qm.className='mkt-qty-btn';qm.textContent='−';
      qm.onclick=(e)=>{e.stopPropagation();if((item.qty||1)<=1){mktState.items.splice(idx,1);}else{item.qty=(item.qty||1)-1;}mktSave();mktRender();};
      const qn=document.createElement('span');qn.className='mkt-qty-num';qn.textContent=item.qty||1;
      const qp=document.createElement('button');qp.className='mkt-qty-btn';qp.textContent='+';
      qp.onclick=(e)=>{e.stopPropagation();item.qty=(item.qty||1)+1;mktSave();mktRender();};
      qty.appendChild(qm);qty.appendChild(qn);qty.appendChild(qp);
      row.appendChild(qty);
    }
    row.appendChild(del);
    listEl.appendChild(row);
  });
}

function mktEditPreset(chip,i,oldVal){
  const inp=document.createElement('input');inp.className='mkt-chip-edit-inp';inp.value=oldVal;
  chip.innerHTML='';chip.appendChild(inp);inp.focus();inp.select();
  const commit=()=>{const v=inp.value.trim();if(v)mktState.presets[i]=v;mktSave();mktRender();};
  inp.onkeydown=e=>{if(e.key==='Enter')commit();if(e.key==='Escape')mktRender();};
  inp.onblur=commit;
}

function mktAddItem(text){
  if(!text.trim())return;
  const existing=mktState.items.find(x=>x.text.toLowerCase()===text.trim().toLowerCase()&&!x.done);
  if(existing){existing.qty=(existing.qty||1)+1;mktSave();mktRender();return;}
  mktState.items.unshift({text:text.trim(),done:false,qty:1});
  mktSave();mktRender();
}

function mktToggle(){
  const popup=document.getElementById('market-popup');
  mktState.open=!mktState.open;
  popup.classList.toggle('open',mktState.open);
  if(mktState.open&&!mktState.dragged){
    const fab=document.getElementById('market-fab');
    if(fab){
      const r=fab.getBoundingClientRect();
      const pw=360,ph=480;
      let left=r.left,top=r.bottom+8;
      if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
      if(top+ph>window.innerHeight-8)top=r.top-ph-8;
      popup.style.left=Math.max(8,left)+'px';popup.style.top=Math.max(8,top)+'px';
      popup.style.bottom='';popup.style.right='';
    }
  }
  renderLists();
}

document.getElementById('market-close').onclick=()=>{
  document.getElementById('market-popup').classList.remove('open');
  mktState.open=false;renderLists();
};
document.getElementById('mkt-inp-btn').onclick=()=>{
  const inp=document.getElementById('mkt-inp');mktAddItem(inp.value);inp.value='';inp.focus();
};
document.getElementById('mkt-inp').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const inp=document.getElementById('mkt-inp');mktAddItem(inp.value);inp.value='';inp.focus();}
});
document.getElementById('mkt-copy').onclick=()=>{
  const lines=['🛒 Λίστα Αγορών',''];
  mktState.items.filter(x=>!x.done).forEach(x=>lines.push((x.qty&&x.qty>1?x.qty+'x ':'')+x.text));
  mktState.items.filter(x=>x.done).forEach(x=>lines.push('✓ '+x.text));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('Αντιγράφηκε!','ok'));
};
document.getElementById('mkt-clear').onclick=()=>{
  mktState.items=[];mktSave();mktRender();
};

// Draggable market popup
(function(){
  let dragging=false,ox=0,oy=0;
  document.addEventListener('mousedown',e=>{
    const h=document.getElementById('market-drag');if(!h||!h.contains(e.target))return;
    const popup=document.getElementById('market-popup');
    const r=popup.getBoundingClientRect();
    ox=e.clientX-r.left;oy=e.clientY-r.top;dragging=true;mktState.dragged=true;
    popup.style.transition='none';e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const popup=document.getElementById('market-popup');
    let left=e.clientX-ox,top=e.clientY-oy;
    left=Math.max(0,Math.min(left,window.innerWidth-popup.offsetWidth));
    top=Math.max(0,Math.min(top,window.innerHeight-popup.offsetHeight));
    popup.style.left=left+'px';popup.style.top=top+'px';
    popup.style.bottom='';popup.style.right='';
  });
  document.addEventListener('mouseup',()=>{dragging=false;});
})();

// Copy note button
document.getElementById('notes-copy-btn').onclick=()=>{
  const n=notesState.notes.find(x=>x.id===notesState.activeId);
  if(!n)return;
  const text=(n.title?n.title+'\n\n':'')+n.body;
  navigator.clipboard.writeText(text).then(()=>showToast('Σημείωση αντιγράφηκε!','ok'));
};

mktLoad();
mktRender();

</script>
